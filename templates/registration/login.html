{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block public_content %}
<div class="col-md-5 col-lg-4 text-center">
    
    <div class="mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-3 shadow mb-3" style="width: 70px; height: 70px;">
            <i class="bi bi-robot fs-1"></i>
        </div>
        <h2 class="fw-bold text-dark">Tizimga kirish</h2>
        <p class="text-muted">Account menejer paneliga xush kelibsiz</p>
    </div>

    <div class="card p-4 text-start shadow-sm border-0">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary w-100 mt-4 py-2 fs-5 fw-bold rounded-pill shadow-sm" type="submit">Kirish</button>
        </form>
    </div>
</div>
{% endblock %}
