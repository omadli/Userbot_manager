# Userbot Manager — host nginx server block for userbots.omadli.uz
#
# This file lives in the repo so it travels with the project, but it is meant
# to be installed on the SERVER's host nginx — not run inside docker.
#
# Why host nginx (not docker):
#   This VPS hosts multiple docker projects (userbots, plus future subdomains).
#   Only ONE process can bind to :80/:443 at a time. Running nginx on the host
#   keeps that single binding under system control, and each docker project
#   exposes itself on a private 127.0.0.1:<port> that nginx fans out to.
#
# ─────────────────────────────────────────────────────────────────────────────
# Setup (one-time, on the server, as root or with sudo):
# ─────────────────────────────────────────────────────────────────────────────
#
#   # 1. Install nginx + certbot (skip if already present from another project).
#   sudo apt update
#   sudo apt install -y nginx certbot python3-certbot-nginx
#
#   # 2. Make sure NO container is binding :80/:443 (this compose doesn't, but
#   #    older deploys had Caddy — clean it up if you upgraded).
#   sudo ss -tlnp | grep -E ':80|:443'   # both lines should be `nginx`
#
#   # 3. Drop this file in place. The path differs per distro; on Debian/Ubuntu:
#   sudo cp ~/apps/userbot-manager/nginx/userbots.omadli.uz.conf \
#           /etc/nginx/sites-available/userbots.omadli.uz.conf
#   sudo ln -s /etc/nginx/sites-available/userbots.omadli.uz.conf \
#              /etc/nginx/sites-enabled/userbots.omadli.uz.conf
#   sudo rm -f /etc/nginx/sites-enabled/default     # don't serve the welcome page
#
#   # 4. Adjust paths inside the file (search for `<<<` markers below):
#   #    - APP_ROOT — absolute path to the repo on the server
#   #    - listen ports — only change if 8000 collides with another project
#
#   # 5. Validate config + reload.
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # 6. Issue a Let's Encrypt cert (certbot rewrites this file in place to add
#   #    `listen 443 ssl;` blocks and the cert paths — that's expected).
#   sudo certbot --nginx -d userbots.omadli.uz --non-interactive --agree-tos \
#                -m you@example.com --redirect
#
#   # 7. Verify auto-renewal is wired up (certbot installs a systemd timer):
#   sudo systemctl list-timers | grep certbot
#
# ─────────────────────────────────────────────────────────────────────────────
# Adding a second docker project on the same server:
# ─────────────────────────────────────────────────────────────────────────────
#
# In the OTHER project's docker-compose.yml, bind its web service to a
# DIFFERENT localhost port — e.g. `127.0.0.1:8001:8000`. Then create
# /etc/nginx/sites-available/<other-domain>.conf modeled after this file
# (proxy_pass http://127.0.0.1:8001;) and certbot it. nginx -s reload.
# Both projects coexist with zero port conflict.
# ─────────────────────────────────────────────────────────────────────────────


# Cap upstream upload size to match Django's expectations (avatar uploads,
# session_string CSV imports, etc.). Adjust if you handle larger files.
client_max_body_size 25m;

# Trusted proxy headers — uvicorn was started with `--proxy-headers
# --forwarded-allow-ips='*'` so it honors X-Forwarded-Proto from us.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_redirect off;

# Long timeouts — Telethon login flows and bulk task creation can take >30s
# on a slow account. 120s is conservative; raise if you see 504s in logs.
proxy_connect_timeout 30s;
proxy_send_timeout    120s;
proxy_read_timeout    120s;

server {
    listen 80;
    listen [::]:80;
    server_name userbots.omadli.uz;

    # certbot --nginx will inject the HTTPS server block on port 443 below
    # and rewrite this server to redirect HTTP→HTTPS. Until then, plain HTTP
    # works fine for the initial provisioning.

    # Static files — collectstatic writes hashed filenames here, safe to
    # cache forever. <<<APP_ROOT>>> Replace with the absolute path to the
    # repo on this server (e.g. /home/ubuntu/apps/userbot-manager).
    location /static/ {
        alias /home/ubuntu/apps/userbot-manager/staticfiles/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Serve gzip pre-compressed if present (whitenoise/Django writes
        # alongside originals when ManifestStaticFilesStorage runs).
        gzip_static on;
    }

    # User uploads — short cache (avatars change). Same APP_ROOT note.
    location /media/ {
        alias /home/ubuntu/apps/userbot-manager/media/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Don't pollute logs with the Docker/health probe and favicon noise.
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        proxy_pass http://127.0.0.1:8000/favicon.ico;
    }

    # Everything else → uvicorn on the docker bridge.
    # If you change WEB_BIND_PORT in .env, change the upstream here too.
    location / {
        proxy_pass http://127.0.0.1:8000;
    }

    # Baseline security headers. Django emits its own X-Frame-Options and
    # HSTS via SECURE_HSTS_*, so we don't duplicate them here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "same-origin" always;

    # Hide nginx version in error pages and Server: header.
    server_tokens off;
}
